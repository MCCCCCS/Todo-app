<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App - Frontend Backend Connection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 My Todo List</h1>
            <p class="subtitle">Connected to backend API</p>
        </div>
        
        <div class="input-section">
            <input 
                type="text" 
                id="todoInput" 
                placeholder="What do you want to do?"
                autofocus
            >
            <button id="addBtn">Add Task</button>
        </div>

        <div class="stats">
            <span id="totalTasks">Total: 0</span>
            <span id="completedTasks">Completed: 0</span>
        </div>

        <div id="todoList"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
